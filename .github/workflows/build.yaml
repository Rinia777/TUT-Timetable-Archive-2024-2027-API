name: Import archive year

on:
  schedule:
    # JST 03:40 on March 31 (March 30 18:40 UTC).
    - cron: "40 18 30 3 *"
  workflow_dispatch:
    inputs:
      year:
        description: "Academic year to import (blank: current academic year minus 2)"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: archive-import
  cancel-in-progress: false

jobs:
  import_archive:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out archive repository
        uses: actions/checkout@v4
        with:
          path: archive

      - name: Check out current API repository
        uses: actions/checkout@v4
        with:
          repository: Rinia777/TUT-Timetable-API
          path: current-api

      - name: Set target academic year
        id: target
        working-directory: archive
        env:
          REQUESTED_YEAR: ${{ inputs.year }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ -n "$REQUESTED_YEAR" ]; then
            target_year="$REQUESTED_YEAR"
          elif [ "$EVENT_NAME" = "schedule" ]; then
            target_year=$((10#$(TZ=Asia/Tokyo date +'%Y') - 3))
          else
            month=$(TZ=Asia/Tokyo date +'%m')
            calendar_year=$(TZ=Asia/Tokyo date +'%Y')
            if [ "$month" -le 3 ]; then
              academic_year=$((10#$calendar_year - 1))
            else
              academic_year=$((10#$calendar_year))
            fi
            target_year=$((academic_year - 2))
          fi
          echo "year=$target_year" >> "$GITHUB_OUTPUT"

      - name: Import and validate archive data
        working-directory: archive
        run: |
          python scripts/import_archive_year.py \
            --source ../current-api \
            --destination . \
            --year ${{ steps.target.outputs.year }} \
            --start-year 2024 \
            --end-year 2027

      - name: Commit and push if needed
        working-directory: archive
        env:
          TARGET_YEAR: ${{ steps.target.outputs.year }}
        run: |
          if git diff --quiet && [ -z "$(git status --porcelain)" ]; then
            echo "No archive changes."
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/api/v1/archive output/lecture_codes_by_year.json
          git commit --author="github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>" -m "Archive $TARGET_YEAR from current API"
          git push
